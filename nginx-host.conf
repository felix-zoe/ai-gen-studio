# ============================================================
# AI Gen Studio — 宿主机 Nginx 配置
# 加入 Nginx 配置后 nginx -t && nginx -s reload
# ============================================================

server {
    listen 80;
    server_name ai.guanrui.icu www.ai.guanrui.icu;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.guanrui.icu www.ai.guanrui.icu;

    ssl_certificate     /etc/ssl/guanrui.icu/fullchain.pem;
    ssl_certificate_key /etc/ssl/guanrui.icu/key.pem;

    client_max_body_size 100m;

    # ---- 前端（Docker 容器 :3000）----
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- API 反向代理（Docker 容器 :8000）----
    location /api/ {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
