services:
  backend:
    build: ./backend
    container_name: ai-gen-backend
    env_file:
      - .env
    environment:
      # 覆盖 SQLite 路径，数据存到 volume 挂载点
      - DATABASE_URL=sqlite:///./data/app.db
      # 生产环境同源部署，无需 CORS（宿主机 Nginx 统一入口）
      - CORS_ORIGINS=["https://${DOMAIN}"]
    volumes:
      - sqlite_data:/app/data
    ports:
      # 仅绑定 127.0.0.1，不对外暴露
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: ai-gen-frontend
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
